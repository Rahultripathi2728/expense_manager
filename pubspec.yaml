name: expense_manager
description: Personal & Group Expense Management App
publish_to: 'none'
version: 2.0.0+14

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  
  # Appwrite SDK
  appwrite: ^25.0.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Charts
  fl_chart: ^0.70.2
  
  # Local Storage
  shared_preferences: ^2.3.4
  
  # Date & Formatting
  intl: ^0.19.0
  
  # Export
  pdf: ^3.11.2
  csv: ^6.0.0
  share_plus: ^10.1.4
  
  # UI
  google_fonts: ^6.2.1
  
  # Utils
  path_provider: ^2.1.5
  shimmer: ^3.0.0
  http: ^1.6.0
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.1
  sqflite: ^2.4.3
  sqflite_sqlcipher: ^3.1.0+1
  workmanager: ^0.9.0
  path: ^1.9.1
  connectivity_plus: ^7.1.1
  sqflite_common_ffi_web: ^1.1.2
  open_filex: ^4.7.0
  flutter_animate: ^4.5.2
  phosphor_flutter: ^2.1.0
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"
